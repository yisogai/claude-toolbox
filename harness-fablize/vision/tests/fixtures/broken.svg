<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="560" viewBox="0 0 600 560">
  <rect x="0" y="0" width="600" height="560" fill="#ffffff"/>

  <g id="diagram">
    <rect id="node-a" x="220" y="20" width="160" height="60" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text id="label-a" x="300" y="56" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1e293b">A</text>

    <rect id="node-b" x="220" y="180" width="160" height="60" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text id="label-b" x="300" y="216" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1e293b">B</text>

    <rect id="node-c" x="220" y="340" width="160" height="60" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text id="label-c" x="300" y="376" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1e293b">C</text>

    <!-- 欠陥1: 浮いたコネクタ。A -> B のはずが、終端(x2,y2)が node-b の上端(y=180)
         から 40px 浮いている（y2=140 で止まっている）。始端は正常。 -->
    <line id="conn-ab" x1="300" y1="80" x2="300" y2="140" stroke="#334155" stroke-width="3"/>

    <!-- 欠陥2: 上下逆矢印。B -> C の向きであるべきところ、始点/終点の座標が
         入れ替わっており（x1,y1 が node-c 側、x2,y2 が node-b 側）、
         矢頭も終点(x2,y2)=node-b側に描かれるため、見た目は C -> B 向きになる。 -->
    <line id="arrow-bc" x1="300" y1="340" x2="300" y2="240" stroke="#334155" stroke-width="3"/>
    <polygon id="arrow-bc-head" points="300,240 288,262 312,262" fill="#334155"/>
  </g>

  <g id="legend">
    <rect x="420" y="440" width="140" height="70" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <rect x="432" y="454" width="16" height="16" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
    <text x="456" y="467" font-family="sans-serif" font-size="12" fill="#1e293b">node</text>
    <line x1="432" y1="488" x2="448" y2="488" stroke="#334155" stroke-width="3"/>
    <text x="456" y="492" font-family="sans-serif" font-size="12" fill="#1e293b">flow</text>
  </g>
</svg>
