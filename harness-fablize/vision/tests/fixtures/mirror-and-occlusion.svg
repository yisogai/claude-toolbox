<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect x="0" y="0" width="500" height="300" fill="#ffffff"/>

  <!-- no_mirror 用: 通常テキスト（変換なし） -->
  <text id="text-normal" x="60" y="50" font-family="sans-serif" font-size="24" fill="#1e293b">NORMAL</text>

  <!-- no_mirror 用: 左右反転テキスト（scale(-1,1) で鏡映） -->
  <text id="text-mirrored" transform="translate(240,50) scale(-1,1)" text-anchor="middle" x="0" y="0"
        font-family="sans-serif" font-size="24" fill="#1e293b">MIRROR</text>

  <!-- no_mirror 用: 180度回転テキスト（回転は鏡映ではないので pass するはず） -->
  <text id="text-rotated180" transform="rotate(180, 400, 50)" text-anchor="middle" x="400" y="50"
        font-family="sans-serif" font-size="24" fill="#1e293b">ROT180</text>

  <!-- visible_at_center 用: 遮蔽されていない不透明矩形 -->
  <rect id="node-visible" x="60" y="150" width="120" height="80" fill="#16a34a"/>
  <text x="120" y="195" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff">visible</text>

  <!-- visible_at_center 用: 後描画の不透明矩形に完全に覆われた要素 -->
  <rect id="node-hidden" x="260" y="150" width="120" height="80" fill="#16a34a"/>
  <text x="320" y="195" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff">hidden</text>
  <rect id="occluder" x="250" y="140" width="140" height="100" fill="#0f172a"/>
</svg>
