<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; font-family: sans-serif; }
  .box { position: absolute; }
  #nuance-leaf { left: 10px; top: 10px; width: 150px; height: 30px; }
  .decoy { left: 150px; top: 35px; width: 150px; height: 30px; }
</style>
</head>
<body>
  <!-- no_overlap_text_leaves の exclude_selector と、all_text_visible の
       max_elements 打ち切りを検証するための小さなフィクスチャ。
       #nuance-leaf と .decoy は右下10px x 5pxだけ実際に重なる（eps=0で違反）。
       exclude_selector=".decoy" を指定すると .decoy が集合から除外され
       違反が消えることを確認する。 -->
  <div id="nuance-leaf" class="box">Nuance Leaf</div>
  <div id="decoy" class="box decoy">Decoy Label</div>
</body>
</html>
