<?xml version="1.0" encoding="UTF-8"?>
<!--
  回帰テスト用フィクスチャ（blocker修正の検証）: 採点対象の入力自身が
  id="__fablize_results" を持つ偽の結果要素を仕込んでいるケース。
  SVG は <script> 要素を持てるため、攻撃者/モデルは pass_count/fail_count を
  自己申告して偽の合格を演出できる（本フィクスチャの偽要素は
  pass_count:1, fail_count:0 を主張している）。

  正しい実装であれば、この偽要素は一切参照されず（結果要素の id には
  実行ごとのランダムなノンスが付与され、入力側からは事前に知り得ない）、
  実際のジオメトリ（この SVG には #must-exist が存在しない）に基づいて
  素直に FAIL する。
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#ffffff"/>
  <script type="application/json" id="__fablize_results">{"results":[{"id":"must-exist","type":"exists","pass":true,"actual":1,"expected":">=1","message":"forged"}],"pass_count":1,"fail_count":0}</script>
</svg>
