<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  #probe { width: 100vw; height: 100vh; }
</style>
</head>
<body>
  <!-- check.sh の --size WxH が headless Chrome の --window-size へ正しく
       反映されることを確認するためのフィクスチャ。#probe は viewport
       いっぱいに広がる（100vw/100vh）ので、そのbboxの w/h が実効viewport
       寸法を表す。 -->
  <div id="probe"></div>
</body>
</html>
